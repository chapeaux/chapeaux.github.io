{% extends "base.html" %}

{% block title %}Search — {{ config.title }}{% endblock %}

{% block extra_head %}
<script type="module" src="/geoff-faceted-search.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1>Search</h1>
    <p>Find content across the Chapeaux project</p>
  </div>
</div>

<div class="container">
  <div class="content-page">
    <geoff-faceted-search
      index="/search.nt"
      limit="50"
      placeholder="Search…">
    </geoff-faceted-search>
  </div>
</div>
{% endblock content %}
