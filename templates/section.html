{% extends "base.html" %}

{% block title %}{{ title }} — {{ config.title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1>{{ title }}</h1>
    {% if description %}
    <p>{{ description }}</p>
    {% endif %}
  </div>
</div>

<div class="container">
  <div class="content-page">
    {{ content | safe }}
  </div>
</div>
{% endblock content %}
