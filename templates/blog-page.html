{% extends "base.html" %}

{% block title %}{{ title }} — {{ config.title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1>{{ title }}</h1>
  </div>
</div>

<div class="container">
  <article class="blog-post">
    {% if date %}
    <div class="post-meta">
      {{ date }}
    </div>
    {% endif %}
    {{ content | safe }}
    <p><a href="/blog/">&larr; All posts</a></p>
  </article>
</div>
{% endblock content %}
