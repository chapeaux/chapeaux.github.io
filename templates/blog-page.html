{% extends "base.html" %}

{% block title %}{{ title }} — {{ config.title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1 {{ rdfa_prop(name="title") | safe }}>{{ title }}</h1>
  </div>
</div>

<div class="container">
  <article class="blog-post" {{ rdfa_attrs | safe }}>
    {% if date %}
    <div class="post-meta">
      <time {{ rdfa_prop(name="date") | safe }} datetime="{{ date }}">{{ date }}</time>
    </div>
    {% endif %}
    {{ rdfa_meta(page_uri=page_uri) | safe }}
    {{ content | safe }}
    <p><a href="/blog/">&larr; All posts</a></p>
  </article>
</div>
{% endblock content %}
